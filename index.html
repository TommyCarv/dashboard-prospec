<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospect Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Roboto Condensed', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 2rem; font-weight: 400; margin-bottom: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
  .card-label { font-size: 0.75rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Bebas Neue', sans-serif; }
  .card-count { font-size: 2.4rem; font-weight: 700; color: #fff; font-family: 'Bebas Neue', sans-serif; }

  /* Sync bar */
  .sync-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .sync-status {
    font-size: 0.75rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.ok { background: #4caf7d; }
  .sync-dot.syncing { background: #f0b429; animation: pulse 0.8s infinite; }
  .sync-dot.error { background: #ff6b6b; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn-sync {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #666;
    padding: 5px 12px;
    font-size: 0.75rem;
    font-family: 'Roboto Condensed', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-sync:hover { border-color: #444; color: #bbb; }

  /* Chart */
  .chart-section {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px 20px 12px;
    margin-bottom: 24px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chart-title { font-size: 1rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Bebas Neue', sans-serif; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .leg { font-size: 0.72rem; color: #888; display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .leg-dot-1 { background: #6ab0ff; }
  .leg-dot-2 { background: #f0b429; }
  .leg-dot-3 { background: #ff9f43; }
  .leg-dot-4 { background: #a29bfe; }
  .leg-dot-5 { background: #4caf7d; }
  .leg-dot-6 { background: #ff6b6b; }
  #chart { width: 100%; }

  .chart-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .btn-range {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #555;
    padding: 4px 10px;
    font-size: 0.72rem;
    font-family: 'Roboto Condensed', sans-serif;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .btn-range:hover { border-color: #444; color: #bbb; }
  .btn-range.active { border-color: #6b9eff; color: #6b9eff; background: rgba(107,158,255,0.08); }

  /* Metric cards */
  .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px 20px;
    min-width: 140px;
    flex: 1;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { border-color: #444; background: #1f1f1f; }
  .card.active { border-color: #6b9eff; background: #1a2035; }
  .card.active .card-label { color: #6b9eff; }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  input[type="text"], select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 8px 12px;
    font-size: 0.875rem;
    outline: none;
  }
  input[type="text"] { flex: 1; min-width: 200px; }
  input[type="text"]::placeholder { color: #555; }
  input[type="text"]:focus, select:focus { border-color: #444; }
  select { cursor: pointer; }
  select option { background: #1a1a1a; }

  input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 15px;
    height: 15px;
    border: 1.5px solid #3a3a3a;
    border-radius: 4px;
    background: #111;
    cursor: pointer;
    position: relative;
    vertical-align: middle;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="checkbox"]:hover { border-color: #555; }
  input[type="checkbox"]:checked { background: #6b9eff; border-color: #6b9eff; }
  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 4px; height: 7px;
    border: 1.5px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  th.check-col, td.check-col { width: 40px; padding: 12px 10px 12px 16px; }

  /* Bulk action bar */
  .bulk-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .selected-count { font-size: 0.8rem; color: #666; min-width: 90px; }
  .btn-apply {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 7px 14px;
    font-size: 0.875rem;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .btn-apply:hover:not(:disabled) { border-color: #555; }
  .btn-apply:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Table */
  table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #666;
    border-bottom: 1px solid #2a2a2a;
    background: #161616;
  }
  td { padding: 12px 16px; border-bottom: 1px solid #1e1e1e; font-size: 0.875rem; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #222; }
  a { color: #6b9eff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .niche { color: #888; font-size: 0.8rem; }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .badge:hover { opacity: 0.8; }
  .badge-0 { background: #2a2a2a; color: #888; }
  .badge-1 { background: #1a3a5c; color: #6ab0ff; }
  .badge-2 { background: #0f2e2c; color: #4ecdc4; }
  .badge-3 { background: #2d2a1a; color: #f0b429; }
  .badge-4 { background: #2d1f0e; color: #ff9f43; }
  .badge-5 { background: #211f3a; color: #a29bfe; }
  .badge-6 { background: #1a3a2a; color: #4caf7d; }
  .badge-7 { background: #3a1a1a; color: #ff6b6b; }
  .num { color: #555; }
  .empty { text-align: center; padding: 40px; color: #555; }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,15,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    gap: 14px;
  }
  .loading-overlay.hidden { display: none; }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid #2a2a2a;
    border-top-color: #6b9eff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.875rem; color: #555; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 28px 32px;
    width: 380px;
    max-width: 92vw;
    animation: popIn 0.18s ease;
  }
  @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-size: 1.4rem; color: #fff; margin-bottom: 10px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .modal-body { font-size: 0.875rem; color: #888; margin-bottom: 26px; line-height: 1.55; }
  .modal-body strong { color: #ff6b6b; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel {
    background: #222; border: 1px solid #333; border-radius: 6px;
    color: #aaa; padding: 8px 18px; font-size: 0.875rem; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-cancel:hover { border-color: #555; color: #eee; }
  .btn-confirm-danger {
    background: #3a1010; border: 1px solid #ff6b6b; border-radius: 6px;
    color: #ff6b6b; padding: 8px 18px; font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-confirm-danger:hover { background: #4e1515; }
</style>
</head>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando dados...</div>
</div>

<h1>Prospect Dashboard</h1>

<!-- Sync status bar -->
<div class="sync-bar">
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Conectando...</span>
  </div>
  <button class="btn-sync" onclick="syncNow()">↻ Sincronizar agora</button>
</div>

<div class="chart-section">
  <div class="chart-header">
    <span class="chart-title" id="chartTitle">Atividade — últimos 30 dias</span>
    <div class="chart-controls">
      <button class="btn-range btn-preset" id="preset-7"  onclick="setPreset(7)">7 dias</button>
      <button class="btn-range btn-preset" id="preset-15" onclick="setPreset(15)">15 dias</button>
      <button class="btn-range btn-preset active" id="preset-30" onclick="setPreset(30)">30 dias</button>
    </div>
  </div>
  <div class="legend" style="margin-bottom:10px;">
    <span class="leg"><span class="leg-dot leg-dot-1"></span>Segui</span>
    <span class="leg"><span class="leg-dot leg-dot-2"></span>Engajamento</span>
    <span class="leg"><span class="leg-dot leg-dot-3"></span>1° contato DM</span>
    <span class="leg"><span class="leg-dot leg-dot-4"></span>Conversando DM</span>
    <span class="leg"><span class="leg-dot leg-dot-5"></span>Convertido</span>
    <span class="leg"><span class="leg-dot leg-dot-6"></span>Perdido</span>
  </div>
  <div id="chart"></div>
</div>

<div class="cards" id="cards"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar por handle ou nicho…">
  <select id="statusFilter">
    <option value="">Todos os status</option>
    <option value="0">Not started</option>
    <option value="1">Segui</option>
    <option value="2">Engajamento</option>
    <option value="3">1° contato DM</option>
    <option value="4">Conversando DM</option>
    <option value="5">Convertido</option>
    <option value="6">Perdido</option>
  </select>
</div>

<div class="bulk-bar">
  <select id="bulkAction">
    <option value="">Ação em massa</option>
    <option value="open">Abrir perfis</option>
    <option disabled>── Mudar status ──</option>
    <option value="status-0">→ Not started</option>
    <option value="status-1">→ Segui</option>
    <option value="status-2">→ Engajamento</option>
    <option value="status-3">→ 1° contato DM</option>
    <option value="status-4">→ Conversando DM</option>
    <option value="status-5">→ Convertido</option>
    <option value="status-6">→ Perdido</option>
    <option disabled>──────────────</option>
    <option value="remove">Remover</option>
  </select>
  <button class="btn-apply" id="btnApply" onclick="applyBulkAction()" disabled>Aplicar</button>
  <span class="selected-count" id="selectedCount"></span>
</div>

<table>
  <thead>
    <tr>
      <th class="check-col"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)"></th>
      <th>#</th>
      <th>Handle</th>
      <th>Nicho</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- Confirmation modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title">Remover prospects</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal()">Cancelar</button>
      <button class="btn-confirm-danger" onclick="confirmRemove()">Sim, remover</button>
    </div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let statuses = {};
let history  = {};
let removedIds = new Set();
let profiles = [];
let selected = new Set();
let visibleIds = [];
let chartDays = 30;
let saveTimer = null;

// ── Sync status UI ────────────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  txt.textContent = text;
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function loadFromSheets() {
  setSyncStatus('syncing', 'Carregando...');
  try {
    const url = API_URL + '?action=load&cb=' + Date.now();
    const res = await fetch(url, {
      method: 'GET',
      mode: 'cors',
    });
    const data = await res.json();
    statuses   = data.statuses  || {};
    history    = data.history   || {};
    removedIds = new Set(data.removed || []);
    profiles   = ALL_PROFILES.filter(p => !removedIds.has(p.id));
    setSyncStatus('ok', 'Sincronizado · ' + timeNow());
    return true;
  } catch (e) {
    setSyncStatus('error', 'Erro ao carregar — usando cache local');
    loadFromLocal();
    return false;
  }
}

async function saveToSheets() {
  setSyncStatus('syncing', 'Salvando...');
  saveToLocal();
  try {
    const payload = JSON.stringify({
      action: 'save',
      statuses,
      history,
      removed: [...removedIds]
    });
    // Use no-cors for POST to avoid preflight issues
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: payload
    });
    setSyncStatus('ok', 'Salvo · ' + timeNow());
  } catch (e) {
    setSyncStatus('error', 'Erro ao salvar — dados salvos localmente');
  }
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToSheets(), 800);
}

async function syncNow() {
  await loadFromSheets();
  render();
}

// ── Local storage fallback ────────────────────────────────────────────────────
const LS_STATUSES = 'prospect_statuses';
const LS_HISTORY  = 'prospect_history';
const LS_REMOVED  = 'prospect_removed';

function saveToLocal() {
  try {
    localStorage.setItem(LS_STATUSES, JSON.stringify(statuses));
    localStorage.setItem(LS_HISTORY,  JSON.stringify(history));
    localStorage.setItem(LS_REMOVED,  JSON.stringify([...removedIds]));
  } catch {}
}

function loadFromLocal() {
  try { statuses   = JSON.parse(localStorage.getItem(LS_STATUSES)) || {}; } catch { statuses = {}; }
  try { history    = JSON.parse(localStorage.getItem(LS_HISTORY))  || {}; } catch { history  = {}; }
  try { removedIds = new Set(JSON.parse(localStorage.getItem(LS_REMOVED)) || []); } catch { removedIds = new Set(); }
  profiles = ALL_PROFILES.filter(p => !removedIds.has(p.id));
}

function timeNow() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function getStatus(id) { return statuses[id] !== undefined ? statuses[id] : 0; }

function advanceStatus(id) {
  const next = (getStatus(id) + 1) % STAGES.length;
  statuses[id] = next;
  if (next === 0) {
    delete history[id];
  } else {
    if (!history[id]) history[id] = {};
    if (!history[id][next]) history[id][next] = todayISO();
  }
  scheduleSave();
  render();
}

// ── Selection ─────────────────────────────────────────────────────────────────
function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  updateBulkBar();
  const allChecked = visibleIds.length > 0 && visibleIds.every(i => selected.has(i));
  const sa = document.getElementById('selectAll');
  if (sa) sa.checked = allChecked;
}

function toggleSelectAll(checked) {
  if (checked) visibleIds.forEach(i => selected.add(i));
  else visibleIds.forEach(i => selected.delete(i));
  document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => { cb.checked = checked; });
  updateBulkBar();
}

function updateBulkBar() {
  const n = selected.size;
  document.getElementById('selectedCount').textContent = n === 0 ? '' : `${n} selecionado${n !== 1 ? 's' : ''}`;
  const hasAction = document.getElementById('bulkAction').value !== '';
  document.getElementById('btnApply').disabled = !(n > 0 && hasAction);
}

document.getElementById('bulkAction').addEventListener('change', updateBulkBar);

// ── Bulk actions ──────────────────────────────────────────────────────────────
function applyBulkAction() {
  const action = document.getElementById('bulkAction').value;
  if (!action || selected.size === 0) return;
  if (action === 'open') doOpenProfiles();
  else if (action === 'remove') showRemoveModal();
  else if (action.startsWith('status-')) bulkSetStatus(parseInt(action.split('-')[1]));
}

function bulkSetStatus(newStatus) {
  const today = todayISO();
  [...selected].forEach(id => {
    statuses[id] = newStatus;
    if (newStatus === 0) { delete history[id]; }
    else {
      if (!history[id]) history[id] = {};
      if (!history[id][newStatus]) history[id][newStatus] = today;
    }
  });
  scheduleSave();
  document.getElementById('bulkAction').value = '';
  updateBulkBar();
  render();
}

function doOpenProfiles() {
  const toOpen = profiles.filter(p => selected.has(p.id));
  toOpen.forEach((p, i) => { setTimeout(() => window.open(p.url, '_blank', 'noopener'), i * 120); });
}

function showRemoveModal() {
  const n = selected.size;
  const plural = n !== 1;
  document.getElementById('modalBody').innerHTML =
    `Você tem certeza? <strong>${n} prospect${plural ? 's' : ''}</strong> ser${plural ? 'ão' : 'á'} removido${plural ? 's' : ''} permanentemente da lista.`;
  document.getElementById('modalOverlay').classList.add('open');
}

function hideModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function confirmRemove() {
  const toRemove = [...selected];
  toRemove.forEach(id => {
    removedIds.add(id);
    delete statuses[id];
    delete history[id];
  });
  profiles = ALL_PROFILES.filter(p => !removedIds.has(p.id));
  selected.clear();
  hideModal();
  scheduleSave();
  render();
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function setPreset(days) {
  chartDays = days;
  document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
  document.getElementById('preset-' + days).classList.add('active');
  renderChart();
}

function buildDays(n) {
  const days = [];
  const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const label = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
    days.push({ iso, label });
  }
  return days;
}

function renderChart() {
  const days = buildDays(chartDays);
  document.getElementById('chartTitle').textContent = `Atividade — últimos ${chartDays} dias`;

  const data = days.map(({ iso, label }) => {
    const counts = {};
    SERIES.forEach(s => { counts[s.key] = 0; });
    Object.values(history).forEach(h => {
      SERIES.forEach(s => { if (h[s.toStatus] === iso) counts[s.key]++; });
    });
    return { label, ...counts };
  });

  const W = 900, H = 170;
  const mL = 28, mR = 12, mT = 8, mB = 32;
  const cW = W - mL - mR, cH = H - mT - mB;
  const maxVal = Math.max(1, ...data.flatMap(d => SERIES.map(s => d[s.key])));
  const n = data.length, ns = SERIES.length;
  const groupW = cW / n;
  const barGap = 1.5;
  const barW = Math.max(2, Math.min(8, (groupW - 10) / ns));
  const groupTotal = ns * barW + (ns - 1) * barGap;
  const gridLines = Math.min(maxVal, 4);

  let grid = '';
  for (let i = 0; i <= gridLines; i++) {
    const y = mT + cH * (1 - i / gridLines);
    const val = Math.round(maxVal * i / gridLines);
    grid += `<line x1="${mL}" y1="${y.toFixed(1)}" x2="${W - mR}" y2="${y.toFixed(1)}" stroke="${i === 0 ? '#2a2a2a' : '#1e1e1e'}" stroke-width="1"/>`;
    grid += `<text x="${mL - 5}" y="${(y + 3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#444">${val}</text>`;
  }

  let bars = '';
  data.forEach((d, i) => {
    const gx = mL + i * groupW + (groupW - groupTotal) / 2;
    SERIES.forEach((s, j) => {
      const val = d[s.key];
      const bH = val === 0 ? 0 : Math.max(2, (val / maxVal) * cH);
      const x = gx + j * (barW + barGap);
      const y = mT + cH - bH;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${s.color}" rx="1.5"/>`;
    });
    const lx = mL + i * groupW + groupW / 2;
    bars += `<text x="${lx.toFixed(1)}" y="${mT + cH + 18}" text-anchor="middle" font-size="9" fill="#555">${d.label}</text>`;
  });

  document.getElementById('chart').innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">${grid}${bars}</svg>`;
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function getCounts() {
  const c = Array(STAGES.length).fill(0);
  profiles.forEach(p => c[getStatus(p.id)]++);
  return c;
}

function renderCards() {
  const counts = getCounts();
  const sf = document.getElementById('statusFilter').value;
  document.getElementById('cards').innerHTML = STAGES.map((s, i) => `
    <div class="card${sf === String(i) ? ' active' : ''}" onclick="filterByCard(${i})">
      <div class="card-label">${s}</div>
      <div class="card-count">${counts[i]}</div>
    </div>`).join('');
}

function filterByCard(stageIndex) {
  const sf = document.getElementById('statusFilter');
  sf.value = sf.value === String(stageIndex) ? '' : String(stageIndex);
  render();
}

// ── Table ─────────────────────────────────────────────────────────────────────
function render() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const sf = document.getElementById('statusFilter').value;
  const filtered = profiles.filter(p => {
    const ms = !search || p.handle.toLowerCase().includes(search) || p.niche.toLowerCase().includes(search);
    const mf = sf === '' || getStatus(p.id) === parseInt(sf);
    return ms && mf;
  });

  visibleIds = filtered.map(p => p.id);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.length === 0
    ? `<tr><td colspan="5" class="empty">Nenhum resultado</td></tr>`
    : filtered.map(p => {
        const st = getStatus(p.id);
        const chk = selected.has(p.id) ? 'checked' : '';
        return `<tr>
          <td class="check-col"><input type="checkbox" ${chk} onchange="toggleSelect(${p.id})"></td>
          <td class="num">${p.id}</td>
          <td><a href="${p.url}" target="_blank" rel="noopener">${p.handle}</a></td>
          <td class="niche">${p.niche || '—'}</td>
          <td><span class="badge badge-${st}" onclick="advanceStatus(${p.id})">${STAGES[st]}</span></td>
        </tr>`;
      }).join('');

  const allChecked = visibleIds.length > 0 && visibleIds.every(i => selected.has(i));
  const sa = document.getElementById('selectAll');
  if (sa) sa.checked = allChecked;

  updateBulkBar();
  renderCards();
  renderChart();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) hideModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  const overlay = document.getElementById('loadingOverlay');
  await loadFromSheets();
  render();
  overlay.classList.add('hidden');
})();
</script>
